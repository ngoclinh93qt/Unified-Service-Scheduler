services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: service_scheduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scheduler -d service_scheduler']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    profiles: ['app']
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://scheduler:scheduler@postgres:5432/service_scheduler
      NODE_ENV: production
      PORT: 3000
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:3000/api/v1/health/ready',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
